<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasmnout</title>
<style>
  @font-face {
    font-family: "Daydream";
    src: url("Daydream.ttf");
  }

  body {
    margin: 0;
    background-color: #111111;
    color: white;
    font-family: "Daydream", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all 0.3s ease;
  }

  h1 {
    font-size: 3rem;
    margin: 20px 0;
    text-align: center;
    color: #FFD700;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
    animation: typing 2s steps(12) 1s infinite;
  }

  @keyframes typing {
    0% { content: "Rasmnout"; }
    100% { content: "Rasmnout|"; }
  }

  .menu {
    display: flex;
    justify-content: space-around;
    width: 100%;
    max-width: 1000px;
    margin-bottom: 20px;
    padding: 10px 20px;
    background-color: #333;
    border-radius: 5px;
  }

  .menu-item {
    font-size: 1.3rem;
    color: #fff;
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
  }

  .menu-item:hover {
    color: #FFD700;
    transform: scale(1.1);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    max-width: 1200px;
    margin: 40px auto;
  }

  .grid-item {
    width: 300px;  /* Nastavení šířky na 300px */
    height: 200px; /* Nastavení výšky na 200px */
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.2);
  }

  .grid-item:hover {
    transform: scale(1.05);
    box-shadow: 0px 0px 30px rgba(255, 215, 0, 0.7);
  }

  .grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s;
  }

  .grid-item:hover img {
    opacity: 0.8;
  }

  .grid-item .text {
    position: absolute;
    bottom: 0;
    width: 100%;
    background-color: rgba(0, 0, 0, 0.7);
    color: white;
    font-size: 1.5rem;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    transition: background-color 0.3s, color 0.3s;
  }

  .grid-item:hover .text {
    background-color: #FFD700;
    color: #111;
  }

  /* Animace pro text ve grid itemech */
  .text {
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.3s ease-out forwards;
  }

  .grid-item:hover .text {
    animation: slideUp 0.3s ease-out forwards;
  }

  @keyframes slideUp {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

<h1>Rasmnout</h1>

<!-- Horní menu -->
<div class="menu">
  <div class="menu-item" onclick="window.location.href='/docs'">docs</div>
  <div class="menu-item" onclick="window.location.href='/installation'">installation</div>

<!-- Mřížka boxů -->
